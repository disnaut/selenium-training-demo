<div class="login-page">
  <div class="login-shell">
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Selenium Training Demo</mat-card-title>
        <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" data-testid="login-username-input" />
            <mat-error *ngIf="usernameControl.touched && usernameControl.invalid">
              Username is required.
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              data-testid="login-password-input"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
            >
              <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
            <mat-error *ngIf="passwordControl.touched && passwordControl.invalid">
              Password is required.
            </mat-error>
          </mat-form-field>

          <mat-checkbox formControlName="rememberMe" data-testid="login-remember-me-checkbox">
            Remember me
          </mat-checkbox>

          <div class="login-error" *ngIf="loginError() as error">
            {{ error }}
          </div>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            class="login-submit"
            [disabled]="isSubmitting()"
            data-testid="login-submit-button"
          >
            {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
          </button>
        </form>
      </mat-card-content>

      <div class="login-overlay" *ngIf="isSubmitting()" data-testid="login-loading-overlay">
        <mat-spinner diameter="40"></mat-spinner>
        <div class="login-overlay-text">Authenticating...</div>
      </div>
    </mat-card>
  </div>
</div>

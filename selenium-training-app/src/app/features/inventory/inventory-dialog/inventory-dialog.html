<h2 mat-dialog-title data-testid="inventory-dialog-title">Edit Inventory Item</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" data-testid="inventory-name-input" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="sku" data-testid="inventory-sku-input" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" data-testid="inventory-name-input" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category" data-testid="inventory-category-input" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Quantity</mat-label>
      <input
        matInput
        type="number"
        formControlName="quantity"
        data-testid="inventory-quantity-input"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status" data-testid="inventory-status-select">
        <mat-option value="In Stock">In Stock</mat-option>
        <mat-option value="Low Stock">Low Stock</mat-option>
        <mat-option value="Out of Stock">Out of Stock</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" data-testid="inventory-location-input" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Last Updated</mat-label>
      <input matInput formControlName="lastUpdated" data-testid="inventory-last-updated-input" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()" data-testid="inventory-cancel-button">
    Cancel
  </button>
  <button
    mat-raised-button
    color="primary"
    type="button"
    (click)="save()"
    data-testid="inventory-save-button"
  >
    Save
  </button>
</mat-dialog-actions>
